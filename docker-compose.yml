version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dpms_user
      POSTGRES_PASSWORD: dpms_password
      POSTGRES_DB: dpms
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env.example
    depends_on:
      - db
      - redis
    ports:
      - '4200:4200'
    volumes:
      - ./apps/backend:/usr/src/app:delegated

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4200
    ports:
      - '3000:3000'
    volumes:
      - ./apps/frontend:/usr/src/app:delegated
    depends_on:
      - backend

volumes:
  db-data:
